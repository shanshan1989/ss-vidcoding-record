<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 随手记账</title>
  <script src="assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-end p-md overflow-hidden">
  <!-- Background Decorative Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[100px] animate-float"></div>
    <div class="absolute -bottom-[15%] -right-[5%] w-[50%] h-[50%] bg-secondary-container/20 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
  </div>

  <!-- Main Card Container -->
  <main class="relative w-full max-w-[1200px] h-[85vh] grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest rounded-2xl shadow-2xl overflow-hidden mb-sm">
    <!-- Left Side: Branding -->
    <section class="hidden md:flex flex-col justify-between p-2xl bg-gradient-to-br from-primary to-[#005236] relative overflow-hidden">
      <div class="relative z-10">
        <div class="flex items-center gap-sm mb-xl">
          <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/30">
            <span class="material-symbols-outlined text-white text-headline-lg">account_balance_wallet</span>
          </div>
          <h1 class="font-headline-lg text-headline-lg text-white font-bold tracking-tight">随手记账</h1>
        </div>
        <h2 class="font-display-md text-display-md text-white mt-lg leading-tight">掌握您的<br>财务健康</h2>
        <p class="font-body-lg text-body-lg text-white/80 mt-md max-w-sm">随手记账，让理财变得像呼吸一样自然。专业、简约、高效。</p>
      </div>
      <div class="relative z-10">
        <div class="flex -space-x-2 overflow-hidden mb-sm">
          <div class="inline-block h-8 w-8 rounded-full bg-primary-100 ring-2 ring-white/40 flex items-center justify-center text-primary text-xs font-bold">A</div>
          <div class="inline-block h-8 w-8 rounded-full bg-secondary-100 ring-2 ring-white/40 flex items-center justify-center text-secondary text-xs font-bold">B</div>
          <div class="inline-block h-8 w-8 rounded-full bg-tertiary-100 ring-2 ring-white/40 flex items-center justify-center text-tertiary text-xs font-bold">C</div>
        </div>
        <p class="font-label-md text-label-md text-white/90">超过 50,000 名用户信赖的选择</p>
      </div>
      <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 -right-32 w-80 h-80 bg-white/10 rounded-full blur-3xl"></div>
    </section>

    <!-- Right Side: Login Form -->
    <section class="flex flex-col justify-between p-margin-mobile md:p-2xl bg-white">
      <div class="flex-grow flex flex-col justify-center">
        <div class="max-w-[400px] mx-auto w-full">
          <!-- Mobile Logo -->
          <div class="flex items-center gap-sm mb-xl md:hidden">
            <span class="material-symbols-outlined text-primary text-headline-lg">account_balance_wallet</span>
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">随手记账</h1>
          </div>

          <div class="mb-xl">
            <h2 class="font-headline-lg text-headline-lg text-on-surface font-bold">欢迎回来</h2>
            <p class="font-body-md text-body-md text-text-muted mt-xs">登录您的账户继续管理账单</p>
          </div>

          <form id="loginForm" class="space-y-lg" onsubmit="return false;">
            <div class="space-y-xs">
              <label for="username" class="font-label-md text-label-md text-on-surface-variant">用户名</label>
              <div class="relative group">
                <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
                <input id="username" name="username" type="text" placeholder="请输入用户名" class="w-full pl-[48px] pr-md py-md bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface">
              </div>
            </div>

            <div class="space-y-xs">
              <div class="flex justify-between items-center">
                <label for="password" class="font-label-md text-label-md text-on-surface-variant">密码</label>
              </div>
              <div class="relative group">
                <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                <input id="password" name="password" type="password" placeholder="请输入密码" class="w-full pl-[48px] pr-[48px] py-md bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface">
                <button type="button" data-toggle-password="password" class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors">
                  <span id="eye-icon" class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            <div class="flex items-center gap-sm">
              <input id="remember" name="remember" type="checkbox" class="w-5 h-5 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0">
              <label for="remember" class="font-body-sm text-body-sm text-text-muted select-none">保持登录状态</label>
            </div>

            <button type="submit" class="w-full bg-primary-container text-white py-md rounded-xl font-headline-lg text-body-lg hover:bg-primary transition-all shadow-md hover:shadow-lg active:scale-[0.98] duration-150 flex items-center justify-center gap-sm mt-md">
              <span>登录</span>
              <span class="material-symbols-outlined">arrow_forward</span>
            </button>
          </form>

          <p class="mt-2xl text-center font-body-sm text-body-sm text-text-muted">
            还没有账号？
            <a href="./pages/register.html" class="text-primary font-bold hover:underline">立即注册</a>
          </p>
        </div>
      </div>

      <div class="mt-lg text-center font-body-sm text-label-sm text-text-muted/60">
        © 2026 随手记账. All Rights Reserved.
      </div>
    </section>
  </main>

  <!-- Success Feedback Overlay -->
  <div id="successOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white p-2xl rounded-2xl shadow-2xl flex flex-col items-center max-w-xs text-center scale-90 transition-transform duration-300">
      <div class="w-16 h-16 bg-primary-container/20 text-primary rounded-full flex items-center justify-center mb-lg">
        <span class="material-symbols-outlined text-[40px]">check_circle</span>
      </div>
      <h3 class="font-headline-lg text-headline-lg text-on-surface font-bold">登录成功</h3>
      <p class="font-body-md text-body-md text-text-muted mt-sm">正在为您跳转到首页...</p>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
