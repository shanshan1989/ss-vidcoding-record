<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>账单明细 - 随手记账</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
  <!-- Top Navigation Bar -->
  <header class="flex justify-between items-center w-full px-margin-desktop h-16 sticky top-0 z-50 bg-surface-container-lowest dark:bg-inverse-surface shadow-sm transition-all duration-150">
    <div class="flex items-center gap-md">
      <h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed">随手记账</h1>
      <nav class="hidden md:flex gap-lg ml-xl">
        <a href="./home.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">首页</a>
        <a href="./transactions.html" class="text-primary dark:text-primary-fixed font-bold border-b-2 border-primary dark:border-primary-fixed pb-1 font-body-md text-body-md">账单</a>
        <a href="./statistics.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">统计</a>
        <a href="./settings.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">设置</a>
      </nav>
    </div>

    <div class="flex items-center gap-md">
      <div class="relative hidden sm:block">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">search</span>
        <input type="text" placeholder="搜索交易流水..." class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 w-64 text-body-sm font-body-sm">
      </div>
      <a href="./settings.html" class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container flex items-center justify-center bg-surface-container-highest">
        <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow w-full max-w-5xl mx-auto px-margin-mobile md:px-margin-desktop py-xl pb-24 md:pb-0">
    <!-- Header: Month Selector & Summary Bar -->
    <div class="mb-xl flex flex-col md:flex-row md:items-end justify-between gap-lg">
      <div class="flex flex-col gap-xs">
        <p class="text-secondary font-label-sm text-label-sm uppercase tracking-wider">当前查看周期</p>
        <div class="flex items-center gap-sm">
          <button type="button" class="p-1 hover:bg-surface-container-high rounded-full transition-colors active:scale-90">
            <span class="material-symbols-outlined">chevron_left</span>
          </button>
          <h2 class="font-display-md text-display-md text-on-surface">2026年 10月</h2>
          <button type="button" class="p-1 hover:bg-surface-container-high rounded-full transition-colors active:scale-90">
            <span class="material-symbols-outlined">chevron_right</span>
          </button>
        </div>
        <div class="flex items-center gap-sm mt-sm">
          <button type="button" data-type="all" class="type-filter-btn px-md py-xs rounded-full text-label-md font-medium bg-primary-container text-on-primary-container transition-all">全部</button>
          <button type="button" data-type="expense" class="type-filter-btn px-md py-xs rounded-full text-label-md font-medium text-secondary hover:bg-surface-variant transition-all">支出</button>
          <button type="button" data-type="income" class="type-filter-btn px-md py-xs rounded-full text-label-md font-medium text-secondary hover:bg-surface-variant transition-all">收入</button>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="grid grid-cols-2 gap-md w-full md:w-auto">
        <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-border-light flex flex-col justify-center min-w-[160px]">
          <span class="text-secondary font-label-sm text-label-sm">本月支出</span>
          <span class="text-alert-red font-number-xl text-number-xl">-¥3,280.00</span>
        </div>
        <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-border-light flex flex-col justify-center min-w-[160px]">
          <span class="text-secondary font-label-sm text-label-sm">本月收入</span>
          <span class="text-primary font-number-xl text-number-xl">+¥4,290.00</span>
        </div>
      </div>
    </div>

    <!-- Transactions Body -->
    <div id="transactionsContainer" class="space-y-xl">
      <!-- Groups will be rendered dynamically -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="hidden md:flex bg-surface-container-low dark:bg-surface-dim border-t border-border-light dark:border-outline-variant w-full py-lg flex-col md:flex-row justify-between items-center px-margin-desktop mt-auto gap-md">
    <div class="flex items-center gap-md">
      <span class="font-label-md text-label-md font-bold text-on-surface">随手记账</span>
      <span class="text-secondary dark:text-secondary-fixed font-body-sm text-body-sm">© 2026 随手记账</span>
    </div>
  </footer>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface-container-lowest border-t border-border-light flex items-center justify-around z-50">
    <a href="./home.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-[10px] font-medium">总览</span>
    </a>
    <a href="./transactions.html" class="flex flex-col items-center text-primary font-bold">
      <span class="material-symbols-outlined">receipt_long</span>
      <span class="text-[10px] font-medium">流水</span>
    </a>
    <a href="./statistics.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">analytics</span>
      <span class="text-[10px] font-medium">统计</span>
    </a>
    <a href="./settings.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-[10px] font-medium">设置</span>
    </a>
  </nav>

  <script src="../assets/js/shared.js"></script>
  <script>
    (function () {
      'use strict';

      if (!SSJ.isLoggedIn()) {
        window.location.href = '../index.html';
        return;
      }

      const now = new Date();
      let currentYear = now.getFullYear();
      let currentMonth = now.getMonth() + 1;
      let currentType = 'all';

      function formatMoneyDisplay(value) {
        const num = Number(value);
        if (isNaN(num)) return '¥0.00';
        const sign = num >= 0 ? '+' : '-';
        return sign + '¥' + Math.abs(num).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatMoneySimple(value) {
        const num = Number(value);
        if (isNaN(num)) return '¥0.00';
        return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function updatePeriodLabel() {
        const label = document.querySelector('h2.font-display-md.text-display-md.text-on-surface');
        if (label) label.textContent = `${currentYear}年 ${currentMonth}月`;
      }

      async function loadSummary() {
        const result = await SSJ.apiRequest(`/transactions/summary?year=${currentYear}&month=${currentMonth}`, 'GET');
        if (!result.success || !result.data.success) return;

        const data = result.data.data;
        const expenseEl = document.querySelector('.grid.grid-cols-2.gap-md .text-alert-red.font-number-xl');
        const balanceEl = document.querySelector('.grid.grid-cols-2.gap-md .text-primary.font-number-xl');

        if (expenseEl) expenseEl.textContent = formatMoneyDisplay(-data.total_expense);
        if (balanceEl) balanceEl.textContent = formatMoneyDisplay(data.total_income);
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderTransactionItem(item) {
        const isExpense = item.type === 'expense';
        const amountClass = isExpense ? 'text-alert-red' : 'text-primary';
        const sign = isExpense ? '-' : '+';
        const icon = item.category.icon || 'payments';
        const accountIcon = item.account.icon || 'account_balance_wallet';

        return `
          <div class="transaction-card group flex items-center justify-between p-lg bg-surface-container-lowest rounded-xl border border-border-light shadow-sm hover:shadow-md transition-all">
            <div class="flex items-center gap-lg">
              <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary-container text-on-primary-container">
                <span class="material-symbols-outlined text-[28px]">${escapeHtml(icon)}</span>
              </div>
              <div>
                <h4 class="font-body-lg text-body-lg text-on-surface font-semibold">${escapeHtml(item.category.name || '未分类')}</h4>
                <div class="flex items-center gap-md mt-0.5">
                  <span class="flex items-center gap-xs font-label-sm text-label-sm text-secondary">
                    <span class="material-symbols-outlined text-[14px]">${escapeHtml(accountIcon)}</span>
                    ${escapeHtml(item.account.name || '未知账户')}
                  </span>
                  ${item.note ? `<span class="text-secondary font-body-sm text-body-sm italic">${escapeHtml(item.note)}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="flex items-center gap-xl">
              <span class="font-number-md text-number-md ${amountClass}">${sign}${formatMoneySimple(item.amount)}</span>
              <div class="action-buttons opacity-0 translate-x-2 transition-all flex gap-sm">
                <button type="button" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-high text-secondary transition-colors">
                  <span class="material-symbols-outlined text-[20px]">edit</span>
                </button>
                <button type="button" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-error-container hover:text-error text-secondary transition-colors">
                  <span class="material-symbols-outlined text-[20px]">delete</span>
                </button>
              </div>
            </div>
          </div>
        `;
      }

      async function loadTransactions() {
        const container = document.getElementById('transactionsContainer');
        if (!container) return;

        container.innerHTML = '<p class="text-center text-secondary py-xl">加载中...</p>';

        try {
          const result = await SSJ.apiRequest(`/transactions/list?year=${currentYear}&month=${currentMonth}&type=${currentType}`, 'GET');
          console.log('账单接口返回:', result);

          if (!result.success) {
            container.innerHTML = `<div class="text-center text-secondary py-xl">
              <p>加载账单失败</p>
              <p class="text-body-sm mt-sm">${escapeHtml(result.data.message || '网络错误')}</p>
            </div>`;
            return;
          }

          if (!result.data.success) {
            container.innerHTML = `<div class="text-center text-secondary py-xl">
              <p>加载账单失败</p>
              <p class="text-body-sm mt-sm">${escapeHtml(result.data.message || '未知错误')}</p>
            </div>`;
            return;
          }

          const groups = result.data.data || [];
          if (groups.length === 0) {
            container.innerHTML = '<p class="text-center text-secondary py-xl">本月没有记录</p>';
            return;
          }

          container.innerHTML = groups.map((group) => `
            <section>
              <div class="flex items-center gap-md mb-md">
                <h3 class="font-headline-lg text-headline-lg text-on-surface">${escapeHtml(group.label)}</h3>
                <span class="text-secondary font-body-sm text-body-sm">${escapeHtml(group.date_display)}</span>
                <div class="flex-grow border-b border-border-light"></div>
              </div>
              <div class="space-y-sm">
                ${group.items.map(renderTransactionItem).join('')}
              </div>
            </section>
          `).join('');
        } catch (error) {
          console.error('加载账单异常:', error);
          container.innerHTML = '<p class="text-center text-secondary py-xl">加载账单时发生错误</p>';
        }
      }

      function initMonthNavigation() {
        const nav = document.querySelector('main > div:first-child > div:first-child');
        if (!nav) return;

        const buttons = nav.querySelectorAll('button');
        buttons.forEach((btn) => {
          const icon = btn.querySelector('.material-symbols-outlined');
          if (!icon) return;
          const text = icon.textContent.trim();
          if (text === 'chevron_left') {
            btn.addEventListener('click', () => {
              currentMonth -= 1;
              if (currentMonth < 1) {
                currentMonth = 12;
                currentYear -= 1;
              }
              updatePeriodLabel();
              loadSummary();
              loadTransactions();
            });
          } else if (text === 'chevron_right') {
            btn.addEventListener('click', () => {
              currentMonth += 1;
              if (currentMonth > 12) {
                currentMonth = 1;
                currentYear += 1;
              }
              updatePeriodLabel();
              loadSummary();
              loadTransactions();
            });
          }
        });
      }

      function initTypeFilter() {
        const buttons = document.querySelectorAll('.type-filter-btn');
        buttons.forEach((btn) => {
          btn.addEventListener('click', () => {
            currentType = btn.dataset.type;
            buttons.forEach((b) => {
              b.classList.remove('bg-primary-container', 'text-on-primary-container');
              b.classList.add('text-secondary', 'hover:bg-surface-variant');
            });
            btn.classList.remove('text-secondary', 'hover:bg-surface-variant');
            btn.classList.add('bg-primary-container', 'text-on-primary-container');
            loadTransactions();
          });
        });
      }

      function initAutoRefresh() {
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            loadSummary();
            loadTransactions();
          }
        });

        window.addEventListener('focus', () => {
          loadSummary();
          loadTransactions();
        });
      }

      updatePeriodLabel();
      initMonthNavigation();
      initTypeFilter();
      initAutoRefresh();
      loadSummary();
      loadTransactions();
      loadRecentTransactions();
    })();
  </script>
</body>
</html>
