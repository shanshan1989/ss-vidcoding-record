<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计报表 - 随手记账</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="bg-surface text-on-background font-body-md min-h-screen flex flex-col">
  <!-- Top Navigation Bar -->
  <nav class="bg-surface-container-lowest dark:bg-inverse-surface shadow-sm dark:border-b dark:border-outline-variant flex justify-between items-center w-full px-margin-desktop h-16 sticky top-0 z-50">
    <div class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed">随手记账</div>
    <div class="hidden md:flex gap-lg items-center">
      <a href="./home.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">首页</a>
      <a href="./transactions.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">账单</a>
      <a href="./statistics.html" class="text-primary dark:text-primary-fixed font-bold bg-primary-container dark:bg-primary-fixed dark:text-primary-container rounded-lg px-md py-sm font-body-md text-body-md">统计</a>
      <a href="./settings.html" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed transition-colors font-body-md text-body-md">设置</a>
    </div>
    <div class="flex items-center gap-md">
      <a href="./settings.html" class="w-8 h-8 rounded-full overflow-hidden border border-outline flex items-center justify-center bg-surface-container-highest">
        <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop py-lg space-y-lg flex-grow pb-24 md:pb-0">
    <!-- Header: Month/Year Selector -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-md animate-fade-in">
      <div>
        <h1 class="font-display-md text-display-md text-primary">财务统计</h1>
        <p class="text-text-muted font-body-md text-body-md">洞察您的收支详情与趋势</p>
      </div>
      <div class="flex items-center bg-surface-container-high p-xs rounded-xl shadow-inner">
        <button type="button" id="yearSelector" class="px-md py-sm rounded-lg text-secondary hover:bg-surface-variant transition-colors font-label-md text-label-md"></button>
        <button type="button" id="monthSelector" class="px-md py-sm rounded-lg bg-surface-container-lowest text-primary font-bold shadow-sm font-label-md text-label-md"></button>
        <button type="button" id="calendarBtn" class="ml-xs p-sm text-primary material-symbols-outlined hover:bg-surface-variant rounded-lg transition-colors">calendar_month</button>
      </div>
    </header>

    <!-- Calendar Popup -->
    <div id="calendarPopup" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center">
      <div class="bg-surface-container-lowest rounded-xl p-lg shadow-xl w-80 max-w-[90vw]">
        <div class="flex justify-between items-center mb-md">
          <button type="button" id="calPrevYear" class="p-sm hover:bg-surface-variant rounded-lg transition-colors material-symbols-outlined text-on-surface">chevron_left</button>
          <span id="calYearLabel" class="font-headline-lg text-headline-lg text-on-surface"></span>
          <button type="button" id="calNextYear" class="p-sm hover:bg-surface-variant rounded-lg transition-colors material-symbols-outlined text-on-surface">chevron_right</button>
        </div>
        <div class="grid grid-cols-4 gap-sm" id="calMonthGrid"></div>
        <button type="button" id="calClose" class="mt-md w-full py-sm bg-surface-variant text-on-surface rounded-lg font-label-md text-label-md hover:bg-surface-container-high transition-colors">关闭</button>
      </div>
    </div>

    <!-- Section 1: Income vs. Expense Comparison Cards -->
    <section id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-gutter animate-fade-in" style="animation-delay: 0.1s;">
      <!-- Expense Card -->
      <div class="bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-border-light flex flex-col justify-between group hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start">
          <div class="p-sm bg-error-container text-on-error-container rounded-lg">
            <span class="material-symbols-outlined">trending_down</span>
          </div>
          <span class="text-text-muted font-label-sm text-label-sm"></span>
        </div>
        <div class="mt-md">
          <p class="text-text-muted font-label-md text-label-md">本月支出</p>
          <h3 class="font-number-xl text-number-xl text-on-surface" id="totalExpense">¥ 0.00</h3>
        </div>
        <div class="w-full bg-surface-variant h-1 rounded-full mt-lg overflow-hidden">
          <div class="bg-error h-full transition-all duration-500" id="expenseBar" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Income Card -->
      <div class="bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-border-light flex flex-col justify-between group hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start">
          <div class="p-sm bg-primary-container text-on-primary-container rounded-lg">
            <span class="material-symbols-outlined">trending_up</span>
          </div>
          <span class="text-text-muted font-label-sm text-label-sm"></span>
        </div>
        <div class="mt-md">
          <p class="text-text-muted font-label-md text-label-md">本月收入</p>
          <h3 class="font-number-xl text-number-xl text-on-surface" id="totalIncome">¥ 0.00</h3>
        </div>
        <div class="w-full bg-surface-variant h-1 rounded-full mt-lg overflow-hidden">
          <div class="bg-primary h-full transition-all duration-500" id="incomeBar" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Balance Card -->
      <div class="bg-primary text-on-primary p-lg rounded-xl shadow-lg flex flex-col justify-between relative overflow-hidden">
        <div class="absolute -right-4 -top-4 opacity-10">
          <span class="material-symbols-outlined text-[120px]">account_balance_wallet</span>
        </div>
        <div class="p-sm bg-on-primary-fixed-variant text-primary-fixed rounded-lg self-start">
          <span class="material-symbols-outlined">savings</span>
        </div>
        <div class="mt-md relative z-10">
          <p class="opacity-80 font-label-md text-label-md" id="balanceLabel">本月结余</p>
          <h3 class="font-number-xl text-number-xl" id="totalBalance">¥ 0.00</h3>
        </div>
        <div class="mt-lg py-sm px-md bg-on-primary text-primary rounded-lg font-bold font-label-md text-label-md w-full text-center inline-block">
          收支相抵
        </div>
      </div>
    </section>

    <!-- Main Content Area: Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
      <!-- Section 2: Large Pie Chart Spending Categories -->
      <section class="lg:col-span-8 bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-border-light overflow-hidden" style="min-height: 320px;">
        <div class="flex justify-between items-center mb-lg">
          <h2 class="font-headline-lg text-headline-lg text-on-surface">支出构成</h2>
        </div>

        <div class="flex flex-col md:flex-row items-center gap-xl">
          <!-- ECharts Pie Chart -->
          <div id="pieChart" class="relative w-64 h-64 flex-shrink-0"></div>

          <!-- Legend -->
          <div class="flex-1 w-full space-y-md" id="pieLegend">
            <div class="text-text-muted text-body-sm">加载中...</div>
          </div>
        </div>
      </section>

      <!-- Section 4: Top 5 Spending Categories -->
      <section class="lg:col-span-4 bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-border-light animate-fade-in" style="animation-delay: 0.3s;">
        <h2 class="font-headline-lg text-headline-lg text-on-surface mb-lg">支出排行 Top 5</h2>
        <div id="top5Container" class="space-y-lg">
          <div class="text-text-muted text-body-sm">加载中...</div>
        </div>
      </section>
    </div>

    <!-- Section 3: Monthly Income/Expense Trends (Line Chart) -->
    <section class="bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-border-light animate-fade-in" style="animation-delay: 0.4s;">
      <div class="flex flex-col md:flex-row justify-between md:items-center mb-xl gap-md">
        <div>
          <h2 class="font-headline-lg text-headline-lg text-on-surface">每月收支情况</h2>
          <p class="text-text-muted font-body-sm text-body-sm" id="trendSubtitle">按月统计全年收支趋势</p>
        </div>
        <div class="flex gap-sm">
          <div class="flex items-center gap-xs">
            <span class="w-3 h-3 rounded-full bg-error"></span>
            <span class="text-label-sm font-label-sm">支出</span>
          </div>
          <div class="flex items-center gap-xs ml-md">
            <span class="w-3 h-3 rounded-full bg-primary"></span>
            <span class="text-label-sm font-label-sm">收入</span>
          </div>
        </div>
      </div>

      <div id="lineChart" class="h-64 w-full"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="hidden md:flex bg-surface-container-low dark:bg-surface-dim border-t border-border-light dark:border-outline-variant w-full py-lg flex-col md:flex-row justify-between items-center px-margin-desktop mt-auto gap-md">
    <div class="font-label-md text-label-md font-bold text-on-surface">© 2026 随手记账</div>
  </footer>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface-container-lowest border-t border-border-light flex items-center justify-around z-50">
    <a href="./home.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-[10px] font-medium">总览</span>
    </a>
    <a href="./transactions.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">receipt_long</span>
      <span class="text-[10px] font-medium">流水</span>
    </a>
    <a href="./statistics.html" class="flex flex-col items-center text-primary font-bold">
      <span class="material-symbols-outlined">analytics</span>
      <span class="text-[10px] font-medium">统计</span>
    </a>
    <a href="./settings.html" class="flex flex-col items-center text-secondary">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-[10px] font-medium">设置</span>
    </a>
  </nav>

  <script src="../assets/js/shared.js"></script>
  <script>
    // ==================== State ====================
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let pieChartInstance = null;
    let lineChartInstance = null;

    // ==================== Auth Check ====================
    if (!SSJ.isLoggedIn()) {
      window.location.href = '../index.html';
    }

    // ==================== Utility ====================
    function formatMoney(value) {
      return '¥ ' + Number(value).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatMoneyShort(value) {
      const n = Number(value);
      if (n >= 10000) return '¥' + (n / 10000).toFixed(1) + 'k';
      return '¥ ' + n.toFixed(0);
    }

    // ==================== Year/Month Selector ====================
    function updateHeaderButtons() {
      document.getElementById('yearSelector').textContent = currentYear + '年';
      document.getElementById('monthSelector').textContent = currentMonth + '月';
    }

    document.getElementById('yearSelector').addEventListener('click', function () {
      document.querySelectorAll('header .flex.items-center > button').forEach(b => {
        b.classList.remove('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
        b.classList.add('text-secondary');
      });
      this.classList.remove('text-secondary');
      this.classList.add('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
      currentYear--;
      updateHeaderButtons();
      loadAllData();
    });

    document.getElementById('monthSelector').addEventListener('click', function () {
      document.querySelectorAll('header .flex.items-center > button').forEach(b => {
        b.classList.remove('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
        b.classList.add('text-secondary');
      });
      this.classList.remove('text-secondary');
      this.classList.add('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
      currentMonth = currentMonth % 12 + 1;
      if (currentMonth === 1) currentYear--;
      updateHeaderButtons();
      loadAllData();
    });

    // ==================== Calendar Popup ====================
    let calYear = currentYear;

    function openCalendar() {
      calYear = currentYear;
      renderCalendar();
      document.getElementById('calendarPopup').classList.remove('hidden');
    }

    function closeCalendar() {
      document.getElementById('calendarPopup').classList.add('hidden');
    }

    function renderCalendar() {
      document.getElementById('calYearLabel').textContent = calYear + '年';
      const grid = document.getElementById('calMonthGrid');
      grid.innerHTML = '';
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      months.forEach((label, i) => {
        const m = i + 1;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        const isActive = m === currentMonth && calYear === currentYear;
        btn.className = 'py-sm rounded-lg font-label-md text-label-md transition-colors ' +
          (isActive
            ? 'bg-primary text-on-primary font-bold'
            : 'text-on-surface hover:bg-surface-variant');
        btn.addEventListener('click', () => {
          currentYear = calYear;
          currentMonth = m;
          updateHeaderButtons();
          loadAllData();
          closeCalendar();
          document.querySelectorAll('header .flex.items-center > button').forEach(b => {
            b.classList.remove('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
            b.classList.add('text-secondary');
          });
          document.getElementById('monthSelector').classList.remove('text-secondary');
          document.getElementById('monthSelector').classList.add('bg-surface-container-lowest', 'text-primary', 'font-bold', 'shadow-sm');
        });
        grid.appendChild(btn);
      });
    }

    document.getElementById('calendarBtn').addEventListener('click', openCalendar);
    document.getElementById('calClose').addEventListener('click', closeCalendar);
    document.getElementById('calPrevYear').addEventListener('click', () => { calYear--; renderCalendar(); });
    document.getElementById('calNextYear').addEventListener('click', () => { calYear++; renderCalendar(); });
    document.getElementById('calendarPopup').addEventListener('click', function (e) {
      if (e.target === this) closeCalendar();
    });

    // ==================== API Calls ====================
    async function loadAllData() {
      await Promise.all([
        loadYearlySummary(),
        loadExpenseByCategory(),
        loadTopExpenses(),
        loadMonthlyTrend()
      ]);
    }

    async function loadYearlySummary() {
      try {
        const res = await SSJ.apiRequest(`/statistics/yearly-summary?year=${currentYear}&month=${currentMonth}`, 'GET');
        if (!res.success || !res.data) return;
        // 兼容双重包装: res.data.data 或 res.data (共享.js统一格式)
        const d = res.data.data || res.data;
        document.getElementById('totalExpense').textContent = formatMoney(d.total_expense);
        document.getElementById('totalIncome').textContent = formatMoney(d.total_income);
        document.getElementById('totalBalance').textContent = formatMoney(d.balance);
        // Update progress bars
        const maxVal = Math.max(Number(d.total_income), Number(d.total_expense));
        document.getElementById('expenseBar').style.width = maxVal > 0 ? (Number(d.total_expense) / maxVal * 100) + '%' : '0%';
        document.getElementById('incomeBar').style.width = maxVal > 0 ? (Number(d.total_income) / maxVal * 100) + '%' : '0%';
      } catch (e) {
        console.error('yearlySummary error', e);
      }
    }

    async function loadExpenseByCategory() {
      try {
        const res = await SSJ.apiRequest(`/statistics/expense-by-category?year=${currentYear}&month=${currentMonth}`, 'GET');
        if (!res.success || !res.data) return;
        const d = res.data.data || res.data;
        renderPieChart(d.categories, d.total_expense);
        renderPieLegend(d.categories, d.total_expense);
      } catch (e) {
        console.error('expenseByCategory error', e);
      }
    }

    async function loadTopExpenses() {
      try {
        const res = await SSJ.apiRequest(`/statistics/top-expenses?year=${currentYear}&month=${currentMonth}&limit=5`, 'GET');
        if (!res.success || !res.data) return;
        renderTop5((res.data.data || res.data).items);
      } catch (e) {
        console.error('topExpenses error', e);
      }
    }

    async function loadMonthlyTrend() {
      try {
        const res = await SSJ.apiRequest(`/statistics/monthly-trend?year=${currentYear}`, 'GET');
        if (!res.success || !res.data) return;
        const monthsData = (res.data.data || res.data).months;
        if (!monthsData) return;
        document.getElementById('trendSubtitle').textContent = `${currentYear}年每月收支趋势`;
        renderLineChart(monthsData);
      } catch (e) {
        console.error('monthlyTrend error', e);
      }
    }

    // ==================== Render Functions ====================
    function renderPieLegend(categories, total) {
      const container = document.getElementById('pieLegend');
      if (!categories || categories.length === 0) {
        container.innerHTML = '<div class="text-text-muted text-body-sm">暂无数据</div>';
        return;
      }
      container.innerHTML = categories.map(c => `
        <div class="flex items-center justify-between group cursor-default">
          <div class="flex items-center gap-sm">
            <span class="w-3 h-3 rounded-full" style="background-color:${c.category_color}"></span>
            <span class="font-body-md text-body-md">${c.category_name}</span>
          </div>
          <div class="text-right">
            <span class="font-number-md text-number-md">${formatMoney(c.amount)}</span>
            <span class="ml-sm text-text-muted font-label-sm text-label-sm">${c.percentage}%</span>
          </div>
        </div>
      `).join('');
    }

    function renderPieChart(categories, total) {
      if (!pieChartInstance) {
        pieChartInstance = echarts.init(document.getElementById('pieChart'));
      }
      if (!categories || categories.length === 0) {
        pieChartInstance.setOption({
          title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { fontSize: 14, color: '#9ca3af' } },
          series: [{ data: [] }],
          graphic: []
        }, false);
        pieChartInstance.resize();
        return;
      }
      const hasData = categories && categories.length > 0;
      const seriesData = hasData ? categories.map(c => ({
        value: c.amount,
        name: c.category_name,
        itemStyle: { color: c.category_color }
      })) : [];
      pieChartInstance.setOption({
        title: { show: false },
        tooltip: hasData ? { trigger: 'item', formatter: '{b}: {c} ({d}%)' } : { show: false },
        series: [{
          type: 'pie',
          radius: ['45%', '70%'],
          center: ['50%', '50%'],
          avoidLabelOverlap: false,
          itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
          label: { show: false },
          emphasis: { label: { show: false } },
          data: seriesData
        }],
        graphic: hasData ? [{
          type: 'text',
          left: 'center',
          top: 'center',
          style: {
            text: '总支出\n' + formatMoneyShort(total),
            textAlign: 'center',
            fill: '#6b7280',
            fontSize: 12,
            fontFamily: 'Inter, sans-serif'
          }
        }] : []
      });
    }


    function renderLineChart(months) {
      if (!lineChartInstance) {
        lineChartInstance = echarts.init(document.getElementById('lineChart'));
        window.addEventListener('resize', () => lineChartInstance && lineChartInstance.resize());
      }
      const expenseData = months.map(m => Number(m.expense));
      const incomeData = months.map(m => Number(m.income));
      lineChartInstance.setOption({
        tooltip: {
          trigger: 'axis',
          formatter: function (params) {
            let html = params[0].name + '月<br/>';
            params.forEach(p => {
              html += '<span style="display:inline-block;margin-right:4px;border-radius:50%;width:10px;height:10px;background-color:' + p.color + '"></span>' + p.seriesName + ': ' + formatMoney(p.value) + '<br/>';
            });
            return html;
          }
        },
        legend: { show: false },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: months.map((_, i) => i + 1 + '月'),
          axisLine: { lineStyle: { color: '#e5e7eb' } },
          axisLabel: { color: '#6b7280', fontSize: 11 }
        },
        yAxis: {
          type: 'value',
          axisLine: { show: false },
          axisLabel: { color: '#6b7280', fontSize: 11, formatter: v => '¥' + v.toLocaleString() },
          splitLine: { lineStyle: { color: '#f3f4f6' } }
        },
        series: [
          {
            name: '支出',
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { color: '#ef4444', width: 2 },
            itemStyle: { color: '#ef4444' },
            areaStyle: { color: 'rgba(239,68,68,0.1)' },
            data: expenseData
          },
          {
            name: '收入',
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { color: '#3b82f6', width: 2 },
            itemStyle: { color: '#3b82f6' },
            areaStyle: { color: 'rgba(59,130,246,0.1)' },
            data: incomeData
          }
        ]
      });
    }

    function renderTop5(items) {
      const container = document.getElementById('top5Container');
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="text-text-muted text-body-sm">暂无数据</div>';
        return;
      }
      const maxAmount = Number(items[0].amount);
      container.innerHTML = items.map((item, i) => `
        <div class="flex items-center gap-md">
          <span class="font-bold ${i === 0 ? 'text-primary' : 'text-text-muted'} italic w-4">${item.rank}</span>
          <div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">${item.category_icon || 'more_horiz'}</span>
          </div>
          <div class="flex-1">
            <div class="flex justify-between items-center mb-1">
              <span class="font-label-md text-label-md">${item.note || item.category_name}</span>
              <span class="font-number-md text-number-md">${formatMoney(item.amount)}</span>
            </div>
            <div class="w-full bg-surface-variant h-1.5 rounded-full">
              <div class="h-full rounded-full ${i === 0 ? 'bg-primary' : 'bg-surface-container-high'}" style="width: ${item.bar_width}%;"></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ==================== Init ====================
    window.addEventListener('load', () => {
