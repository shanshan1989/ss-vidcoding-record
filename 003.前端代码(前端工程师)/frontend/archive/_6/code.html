<script>
        // Micro-interaction for inputs
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#006c49';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '#3c4a42';
            });
        });

        // Simple button active state simulation
        const saveBtn = document.querySelector('button.bg-primary-container');
        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerText;
            saveBtn.innerText = '正在保存...';
            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-70');
            
            setTimeout(() => {
                saveBtn.innerText = '已成功保存';
                saveBtn.classList.remove('bg-primary-container');
                saveBtn.classList.add('bg-primary', 'text-white');
                
                setTimeout(() => {
                    saveBtn.innerText = originalText;
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('opacity-70', 'bg-primary', 'text-white');
                    saveBtn.classList.add('bg-primary-container');
                }, 2000);
            }, 1000);
        });
    </script>
