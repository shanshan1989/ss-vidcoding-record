<script>
        // Micro-interaction for password visibility toggle
        const toggleButtons = document.querySelectorAll('button[type="button"]');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.previousElementSibling;
                const icon = btn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });

        // Simple button loading state simulation
        const regButton = document.querySelector('button.bg-primary-container');
        regButton.addEventListener('click', (e) => {
            const originalContent = regButton.innerHTML;
            regButton.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span>`;
            regButton.disabled = true;
            setTimeout(() => {
                regButton.innerHTML = originalContent;
                regButton.disabled = false;
            }, 1500);
        });
    </script>
