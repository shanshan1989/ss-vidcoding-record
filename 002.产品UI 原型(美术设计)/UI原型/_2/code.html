<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4fbf4; /* surface from config */
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#454748",
                        "on-primary-container": "#00422b",
                        "surface-dim": "#d4dcd5",

                        "inverse-primary": "#4edea3",
                        "on-secondary-container": "#626566",
                        "tertiary-fixed": "#ffdad7",
                        "secondary-fixed-dim": "#c5c7c8",
                        "secondary-fixed": "#e1e3e4",
                        "on-surface-variant": "#3c4a42",
                        "secondary": "#5c5f60",
                        "on-tertiary-fixed": "#410005",
                        "border-light": "#E5E7EB",
                        "surface-container": "#e8f0e9",
                        "on-tertiary-container": "#711419",
                        "secondary-container": "#e1e3e4",
                        "on-surface": "#161d19",
                        "on-primary-fixed-variant": "#005236",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e3eae3",
                        "inverse-surface": "#2b322d",
                        "warning-yellow": "#F59E0B",
                        "inverse-on-surface": "#ebf3eb",
                        "primary-fixed-dim": "#4edea3",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3af",
                        "on-secondary-fixed": "#191c1d",
                        "on-background": "#161d19",
                        "surface-variant": "#dde4dd",
                        "surface-container-low": "#eef6ee",
                        "tertiary-container": "#fc7c78",
                        "surface-bright": "#f4fbf4",
                        "primary-fixed": "#6ffbbe",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#002113",
                        "on-error-container": "#93000a",
                        "primary-container": "#10b981",
                        "on-primary": "#ffffff",
                        "surface-tint": "#006c49",
                        "on-secondary": "#ffffff",
                        "outline": "#6c7a71",
                        "background": "#f4fbf4",
                        "surface-container-highest": "#dde4dd",
                        "on-tertiary": "#ffffff",
                        "primary": "#006c49",
                        "tertiary": "#a43a3a",
                        "alert-red": "#EF4444",
                        "surface-container-lowest": "#ffffff",
                        "text-main": "#1F2937",
                        "text-muted": "#6B7280",
                        "on-tertiary-fixed-variant": "#842225",
                        "outline-variant": "#bbcabf"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "sm": "8px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "base": "4px",
                        "xl": "32px",
                        "xs": "4px",
                        "md": "16px",
                        "2xl": "48px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "display-md": ["Inter"],
                        "number-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "number-xl": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "number-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "number-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-end p-md overflow-hidden">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[100px] animate-float"></div>
<div class="absolute -bottom-[15%] -right-[5%] w-[50%] h-[50%] bg-secondary-container/20 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
</div>
<!-- Main Card Container -->
<main class="relative w-full max-w-[1200px] h-[85vh] grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest rounded-2xl shadow-2xl overflow-hidden mb-sm">
<!-- Left Side: Branding/Marketing -->
<section class="hidden md:flex flex-col justify-between p-2xl bg-gradient-to-br from-primary to-[#005236] relative overflow-hidden">
<div class="relative z-10">
<div class="flex items-center gap-sm mb-xl">
<div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/30">
<span class="material-symbols-outlined text-white text-headline-lg" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-white font-bold tracking-tight">随手记账</h1>
</div>
<h2 class="font-display-md text-display-md text-white mt-lg leading-tight">掌握您的<br/>财务健康</h2>
<p class="font-body-lg text-body-lg text-white/80 mt-md max-w-sm">随手记账，让理财变得像呼吸一样自然。专业、简约、高效。</p>
</div>
<div class="relative z-10">
<div class="flex -space-x-2 overflow-hidden mb-sm">
<img alt="用户 1" class="inline-block h-8 w-8 rounded-full ring-2 ring-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAL2AvemvEN435opW3DIhi0ncy5l29VNxWOv1hEoPZhr5Hzdxy3-x1pFFT1OiU2AkSfNG-jPDsQtQichOz9oJbZRBWCNKCR6yeAirhQO8ZLjRhLKjWkJSqiqKsDuDU5vP5GS5B5PbiTwA7x2iNndJSdqbagrRr1_bpBUkN7LjPC_wpRGWri2DPJIrAjapt5qYZDZ9_-mw10zW9e4m7_DiCIqmM9iWlO2XR34dClfA3TLa4QZIX3Nx6hBkDaabj0tn1EGYO62A23ieKY"/>
<img alt="用户 2" class="inline-block h-8 w-8 rounded-full ring-2 ring-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBimnCEzjj78MCLWMVU8vz_M7hwXOF_n9gpzwmRnptGqT1z78u25OJUZn8dhtz8eAoXzubmFY3XV9GQHrlzRl-yF6fskfj-TjDkQFCnadArvS8cVI6EM198dgXa6LDMc0-kbA4ov7scUpnx9_0IDenI8Hq__6V17liLPzHuNVmvgBM2HRvdaNGGxyfeOigSj_uUwAnQRur4xmDcBwjMSA_wI_NYUp7HCDb3uyYSYjKlpm57XpMJSKjyFN-wahmnmTJp2Ex1R3BocQKH"/>
<img alt="用户 3" class="inline-block h-8 w-8 rounded-full ring-2 ring-primary" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6N3uh5YpKRbC_Utpoh8Z0Ck1c48NcqBxEJOwROaXpQaVRG7DAC1fB0N9Ndd5OsSqEQki4JoltfLTD8KooVfb2VaMAijoY7FVSmE-Ot6X1eMFgLSuVcmdz0uVJ_DrvKzG-LLeu6HXz2wdsOdQZB4CKYDpTYpC43hD6Zm-BiJdZO6um5hGRWCwjG96tOU95FSUgpPbK-ueJ3LK1jgCQXOB97rkOGgvlY3GWUWdBl-xGw9tMgjjUA1sF9ABdWLd0JNbAeBmqTU4Q5Kc"/>
</div>
<p class="font-label-md text-label-md text-white/90">超过 50,000 名用户信赖的选择</p>
</div>
<!-- Abstract decorative shape -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-32 w-80 h-80 bg-white/10 rounded-full blur-3xl"></div>
</section>
<!-- Right Side: Login Form -->
<section class="flex flex-col justify-between p-margin-mobile md:p-2xl bg-white">
<div class="flex-grow flex flex-col justify-center">
<div class="max-w-[400px] mx-auto w-full">
<!-- Mobile Logo -->
<div class="flex items-center gap-sm mb-xl md:hidden">
<span class="material-symbols-outlined text-primary text-headline-lg" data-icon="account_balance_wallet">account_balance_wallet</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">随手记账</h1>
</div>
<div class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface font-bold">欢迎回来</h2>
<p class="font-body-md text-body-md text-text-muted mt-xs">登录您的账户继续管理账单</p>
</div>
<form class="space-y-lg" id="loginForm" onsubmit="return false;">
<!-- Username Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">用户名</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface" id="username" name="username" placeholder="请输入用户名" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">密码</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-md bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface" id="password" name="password" placeholder="请输入密码" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Keep Logged In -->
<div class="flex items-center gap-sm">
<input class="w-5 h-5 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-text-muted select-none" for="remember">保持登录状态</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-white py-md rounded-xl font-headline-lg text-body-lg hover:bg-primary transition-all shadow-md hover:shadow-lg active:scale-[0.98] duration-150 flex items-center justify-center gap-sm mt-md" type="submit">
<span>登录</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Register Footer -->
<p class="mt-2xl text-center font-body-sm text-body-sm text-text-muted">
                        还没有账号? 
                        <a class="text-primary font-bold hover:underline" href="#">立即注册</a>
</p>
</div>
</div>
<!-- Copyright Footer inside the card -->
<div class="mt-lg text-center font-body-sm text-label-sm text-text-muted/60">
                © 2026 随手记账. All Rights Reserved.
            </div>
</section>
</main>
<!-- Success Feedback Overlay (Hidden by default) -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" id="successOverlay">
<div class="bg-white p-2xl rounded-2xl shadow-2xl flex flex-col items-center max-w-xs text-center scale-90 transition-transform duration-300">
<div class="w-16 h-16 bg-primary-container/20 text-primary rounded-full flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-[40px]" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<h3 class="font-headline-lg text-headline-lg text-on-surface font-bold">登录成功</h3>
<p class="font-body-md text-body-md text-text-muted mt-sm">正在为您跳转到首页...</p>
</div>
</div>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        const loginForm = document.getElementById('loginForm');
        const successOverlay = document.getElementById('successOverlay');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            successOverlay.classList.remove('opacity-0', 'pointer-events-none');
            successOverlay.querySelector('div').classList.remove('scale-90');
            successOverlay.querySelector('div').classList.add('scale-100');
            
            setTimeout(() => {
                successOverlay.classList.add('opacity-0', 'pointer-events-none');
            }, 2000);
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('duration-200');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
