<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账单管理 - 随手记账后台管理系统</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="bg-surface">

  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span>
        </div>
        <div><h1 class="font-headline-md font-bold text-primary">随手记账</h1><p class="text-label-sm text-secondary">后台管理系统</p></div>
      </div>
      <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition">
        <span class="material-symbols-outlined text-lg">logout</span>
      </button>
    </div>
  </header>

  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="./dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="./users.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="./transactions.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./statistics/overview.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="./accounts.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="./budgets.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
    </aside>

    <main class="flex-1 md:ml-60 p-6">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface">账单管理</h2>
          <p class="text-sm text-secondary mt-1">查看所有用户账单记录</p>
        </div>
        <button onclick="exportCSV()" class="flex items-center gap-2 px-4 py-2 border border-border rounded-lg text-sm hover:bg-surface-container transition">
          <span class="material-symbols-outlined text-lg">download</span> 导出CSV
        </button>
      </div>

      <!-- 筛选栏 -->
      <div class="bg-white rounded-xl border border-border-light p-4 mb-6 shadow-card">
        <form id="filterForm" class="flex flex-wrap gap-3 items-end">
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">用户名</label>
            <input type="text" id="searchUserId" placeholder="用户ID或用户名" class="px-3 py-2 border border-border rounded-lg text-sm w-36 focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">账单类型</label>
            <select id="typeFilter" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
              <option value="all">全部</option>
              <option value="expense">支出</option>
              <option value="income">收入</option>
              <option value="transfer">转账</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">分类</label>
            <select id="categoryFilter" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
              <option value="">全部</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">开始日期</label>
            <input type="date" id="startDate" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">结束日期</label>
            <input type="date" id="endDate" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">备注搜索</label>
            <input type="text" id="keywordFilter" placeholder="备注关键词" class="px-3 py-2 border border-border rounded-lg text-sm w-32 focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:bg-primary-hover transition">查询</button>
            <button type="button" onclick="resetFilters()" class="px-4 py-2 border border-border rounded-lg text-sm ml-2 hover:bg-surface-container transition">重置</button>
          </div>
        </form>
      </div>

      <!-- 支出分类饼图 -->
      <div id="chartSection" class="bg-white rounded-xl border border-border-light p-5 mb-6 shadow-card hidden">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold text-on-surface">支出分类分布（当前筛选）</h3>
        </div>
        <div class="flex items-center gap-6">
          <div id="expensePieChart" style="width:280px; height:200px;"></div>
          <div id="expenseLegend" class="flex-1 grid grid-cols-2 gap-2"></div>
        </div>
      </div>

      <!-- 表格 -->
      <div class="bg-white rounded-xl border border-border-light shadow-card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>账单ID</th>
                <th>用户</th>
                <th>类型</th>
                <th>金额</th>
                <th>分类</th>
                <th>账户</th>
                <th>日期</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="txnTableBody"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-t border-border-light bg-surface-container">
          <span class="text-sm text-secondary" id="totalText"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    let currentPage = 1, pageSize = 50;
    let currentFilters = {};
    let pieChart = null;

    const typeMap = { expense: '支出', income: '收入', transfer: '转账' };
    const typeColor = { expense: 'text-alert-red', income: 'text-blue-500', transfer: 'text-purple-500' };

    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../login.html'; return; }
      // 读取 URL 参数
      const params = new URLSearchParams(window.location.search);
      if (params.get('userId')) document.getElementById('searchUserId').value = params.get('userId');
      loadCategories();
      loadTransactions();
      document.getElementById('filterForm').addEventListener('submit', e => { e.preventDefault(); applyFilters(); });
    });

    async function loadCategories() {
      const [expRes, incRes] = await Promise.all([
        SSJ.apiRequest('/categories?type=expense'),
        SSJ.apiRequest('/categories?type=income')
      ]);
      const all = [...(expRes.data?.data || []), ...(incRes.data?.data || [])];
      const sel = document.getElementById('categoryFilter');
      sel.innerHTML = '<option value="">全部</option>' + all.map(c =>
        `<option value="${c.id}">${c.name}</option>`
      ).join('');
    }

    function applyFilters() {
      currentFilters = {
        userId: document.getElementById('searchUserId').value.trim(),
        type: document.getElementById('typeFilter').value,
        categoryId: document.getElementById('categoryFilter').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        keyword: document.getElementById('keywordFilter').value.trim()
      };
      currentPage = 1;
      loadTransactions();
    }

    function resetFilters() {
      document.getElementById('searchUserId').value = '';
      document.getElementById('typeFilter').value = 'all';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('keywordFilter').value = '';
      currentFilters = {};
      currentPage = 1;
      loadTransactions();
    }

    async function loadTransactions() {
      const params = { page: currentPage, pageSize, ...currentFilters };
      const query = new URLSearchParams();
      Object.entries(params).forEach(([k, v]) => v && query.append(k, v));
      const result = await SSJ.apiRequest('/transactions?' + query.toString());
      if (result.success && result.data.success) {
        renderTable(result.data.data);
        // 只在筛选了支出时才显示饼图
        if (currentFilters.type === 'expense' || (!currentFilters.type)) {
          document.getElementById('chartSection').classList.remove('hidden');
          loadExpensePie();
        } else {
          document.getElementById('chartSection').classList.add('hidden');
        }
      } else {
        SSJAdmin.showToast('加载失败', true);
      }
    }

    async function loadExpensePie() {
      const params = { type: 'expense', ...currentFilters };
      const query = new URLSearchParams();
      Object.entries(params).forEach(([k, v]) => v && query.append(k, v));
      const result = await SSJ.apiRequest('/transactions?' + query.toString());
      if (!result.success || !result.data.success) return;
      const list = result.data.data.list;
      // 按分类聚合
      const map = {};
      list.forEach(t => {
        const name = t.category_name || '未分类';
        if (!map[name]) map[name] = { name, amount: 0, color: t.category_color || '#607D8B' };
        map[name].amount += Number(t.amount);
      });
      const data = Object.values(map).sort((a, b) => b.amount - a.amount);
      const total = data.reduce((s, d) => s + d.amount, 0);
      if (pieChart) pieChart.dispose();
      pieChart = echarts.init(document.getElementById('expensePieChart'));
      pieChart.setOption({
        tooltip: { trigger: 'item', formatter: p => `${p.name}: ¥${Number(p.value).toLocaleString()} (${p.percent}%)` },
        series: [{ type: 'pie', radius: ['40%', '70%'], center: ['50%', '50%'],
          itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
          label: { show: false }, emphasis: { label: { show: false } },
          data: data.map(d => ({ value: d.amount.toFixed(2), name: d.name, itemStyle: { color: d.color } }))
        }]
      });
      document.getElementById('expenseLegend').innerHTML = data.slice(0, 8).map(d =>
        `<div class="flex items-center gap-2 text-xs"><span class="w-3 h-3 rounded-full" style="background:${d.color}"></span><span>${d.name}</span><span class="ml-auto font-medium">¥${Number(d.amount).toLocaleString()}</span></div>`
      ).join('');
      window.addEventListener('resize', () => pieChart && pieChart.resize());
    }

    function renderTable(data) {
      const { list, total, pageSize: ps } = data;
      document.getElementById('totalText').textContent = `共 ${total} 条`;
      const tbody = document.getElementById('txnTableBody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-secondary py-12">暂无数据</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      tbody.innerHTML = list.map(t => `
        <tr>
          <td class="text-xs text-secondary">${t.id}</td>
          <td><a href="./user-detail.html?id=${t.user_id}" class="text-primary text-sm">${t.username}</a></td>
          <td><span class="badge ${t.type === 'expense' ? 'badge-danger' : t.type === 'income' ? 'badge-info' : 'badge-warning'}">${typeMap[t.type] || t.type}</span></td>
          <td class="font-semibold ${typeColor[t.type]}">${t.type === 'transfer' ? '' : '¥'}${Number(t.amount).toLocaleString()}</td>
          <td>${t.category_name || (t.type === 'transfer' ? '-' : '未分类')}</td>
          <td class="text-sm">${t.type === 'transfer' ? (t.from_account_name + ' → ' + (t.to_account_name || '-')) : (t.from_account_name || '-')}</td>
          <td>${t.transaction_date}</td>
          <td class="text-xs text-secondary max-w-32 truncate">${t.note || '-'}</td>
          <td><a href="./transaction-detail.html?id=${t.id}" class="text-primary text-sm">详情</a></td>
        </tr>
      `).join('');
      renderPagination(total, ps);
    }

    function renderPagination(total, ps) {
      const totalPages = Math.ceil(total / ps);
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
          html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 3) {
          html += `<span class="px-1">...</span>`;
        }
      }
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">下一页</button>`;
      container.innerHTML = html;
    }

    function goPage(p) { currentPage = p; loadTransactions(); }

    function exportCSV() {
      const params = { ...currentFilters };
      const query = new URLSearchParams();
      Object.entries(params).forEach(([k, v]) => v && query.append(k, v));
      window.open(SSJ.API_BASE_URL + '/transactions/export?' + query.toString(), '_blank');
    }
  </script>
</body>
</html>
