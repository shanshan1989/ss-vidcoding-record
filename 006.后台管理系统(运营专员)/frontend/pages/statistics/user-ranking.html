<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户消费排行 - 随手记账后台管理系统</title>
  <script src="../../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/components.css">
</head>
<body class="bg-surface">
  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span></div>
        <div><h1 class="font-headline-md font-bold text-primary">随手记账</h1><p class="text-label-sm text-secondary">后台管理系统</p></div>
      </div>
      <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">logout</span></button>
    </div>
  </header>
  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="../dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="../users.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="../transactions.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./overview.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="../accounts.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="../budgets.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
      <div class="mt-4 border-t border-border-light pt-4">
        <p class="text-xs font-semibold text-secondary mb-2 px-3">统计分析</p>
        <nav class="flex flex-col gap-1">
          <a href="./overview.html" class="sidebar-nav-item text-sm"><span class="material-symbols-outlined text-lg">account_balance</span> 收支概览</a>
          <a href="./expense-breakdown.html" class="sidebar-nav-item text-sm"><span class="material-symbols-outlined text-lg">pie_chart</span> 支出分类分析</a>
          <a href="./income-breakdown.html" class="sidebar-nav-item text-sm"><span class="material-symbols-outlined text-lg">pie_chart</span> 收入分类分析</a>
          <a href="./user-ranking.html" class="sidebar-nav-item text-sm active"><span class="material-symbols-outlined text-lg">leaderboard</span> 用户消费排行</a>
        </nav>
      </div>
    </aside>
    <main class="flex-1 md:ml-60 p-6">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface">用户消费排行榜</h2>
          <p class="text-sm text-secondary mt-1">本月支出金额排名</p>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-secondary">月份：</label>
          <input type="month" id="yearMonth" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
        </div>
      </div>
      <div id="loadingState" class="text-center py-20 text-secondary"><span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span><p class="mt-3">加载中...</p></div>
      <div id="contentArea" class="hidden">
        <div class="bg-white rounded-xl border border-border-light shadow-card overflow-hidden">
          <table class="data-table">
            <thead>
              <tr>
                <th>排名</th>
                <th>用户名</th>
                <th>昵称</th>
                <th>本月支出总额</th>
                <th>账单数量</th>
                <th>平均单笔金额</th>
              </tr>
            </thead>
            <tbody id="rankTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../../assets/js/shared.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../../login.html'; return; }
      const now = new Date();
      document.getElementById('yearMonth').value = now.toISOString().slice(0, 7);
      loadData();
      document.getElementById('yearMonth').addEventListener('change', loadData);
    });
    async function loadData() {
      const ym = document.getElementById('yearMonth').value;
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentArea').classList.remove('hidden');
      const result = await SSJ.apiRequest('/statistics/user-ranking?yearMonth=' + ym);
      if (result.success && result.data.success) renderData(result.data.data);
    }
    function renderData(data) {
      const tbody = document.getElementById('rankTable');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-12">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(d => `
        <tr class="${d.rank <= 3 ? 'bg-yellow-50' : ''}">
          <td>
            ${d.rank === 1 ? '<span class="badge badge-warning text-base px-2 py-1">🥇</span>' :
              d.rank === 2 ? '<span class="badge badge-warning text-base px-2 py-1">🥈</span>' :
              d.rank === 3 ? '<span class="badge badge-warning text-base px-2 py-1">🥉</span>' :
              `<span class="badge badge-info">${d.rank}</span>`}
          </td>
          <td><a href="../user-detail.html?id=${d.user_id}" class="text-primary font-medium">${d.username}</a></td>
          <td>${d.nickname || '-'}</td>
          <td class="font-bold text-alert-red">¥${Number(d.total_expense).toLocaleString()}</td>
          <td>${d.transaction_count}</td>
          <td class="text-secondary">¥${Number(d.avg_amount).toLocaleString()}</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
