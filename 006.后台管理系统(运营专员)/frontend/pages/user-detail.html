<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户详情 - 随手记账后台管理系统</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="bg-surface">

  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span>
        </div>
        <div>
          <h1 class="font-headline-md font-bold text-primary">随手记账</h1>
          <p class="text-label-sm text-secondary">后台管理系统</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a href="./users.html" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition">
          <span class="material-symbols-outlined text-lg">arrow_back</span> 返回用户列表
        </a>
        <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition">
          <span class="material-symbols-outlined text-lg">logout</span>
        </button>
      </div>
    </div>
  </header>

  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="./dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="./users.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="./transactions.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./statistics/overview.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="./accounts.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="./budgets.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
    </aside>

    <main class="flex-1 md:ml-60 p-6">
      <div id="loadingState" class="text-center py-20 text-secondary">
        <span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span><p class="mt-3">加载中...</p>
      </div>
      <div id="contentArea" class="hidden">

        <!-- 基本信息 -->
        <div class="bg-white rounded-xl border border-border-light p-6 mb-6 shadow-card">
          <h3 class="font-semibold text-on-surface mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">person</span> 基本信息
          </h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="basicInfo"></div>
        </div>

        <!-- 账户概况 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
          <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
            <p class="stat-card-label">账户数量</p>
            <p class="stat-card-value" id="accountCount">-</p>
          </div>
          <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
            <p class="stat-card-label">当前总余额</p>
            <p class="stat-card-value text-primary" id="totalBalance">-</p>
          </div>
          <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
            <p class="stat-card-label">账户状态</p>
            <p class="stat-card-value" id="userStatus">-</p>
          </div>
        </div>

        <!-- 本月统计 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
            <p class="stat-card-label">本月收入</p>
            <p class="stat-card-value text-blue-500" id="monthIncome">-</p>
          </div>
          <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
            <p class="stat-card-label">本月支出</p>
            <p class="stat-card-value text-alert-red" id="monthExpense">-</p>
          </div>
        </div>

        <!-- 快速入口 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
          <a id="viewTransactionsBtn" href="#" class="flex items-center justify-center gap-2 py-3 bg-primary text-white rounded-xl font-semibold hover:bg-primary-hover transition shadow-card">
            <span class="material-symbols-outlined">receipt_long</span> 查看该用户账单
          </a>
          <a id="viewAccountsBtn" href="#" class="flex items-center justify-center gap-2 py-3 bg-white text-primary border border-primary rounded-xl font-semibold hover:bg-primary-container transition shadow-card">
            <span class="material-symbols-outlined">account_balance_wallet</span> 查看该用户账户
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('id');
      if (!userId) { window.location.href = './users.html'; return; }
      loadUserDetail(userId);
    });

    async function loadUserDetail(userId) {
      const result = await SSJ.apiRequest(`/users/${userId}`);
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentArea').classList.remove('hidden');
      if (result.success && result.data.success) {
        renderUserDetail(result.data.data, userId);
      } else {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty-state"><span class="material-symbols-outlined text-4xl text-alert-red">error</span><p>用户不存在</p></div>';
      }
    }

    function renderUserDetail(u, userId) {
      document.getElementById('basicInfo').innerHTML = `
        <div><p class="text-xs text-secondary">用户ID</p><p class="text-sm font-mono mt-1">${u.id}</p></div>
        <div><p class="text-xs text-secondary">用户名</p><p class="text-sm font-medium mt-1">${u.username}</p></div>
        <div><p class="text-xs text-secondary">昵称</p><p class="text-sm mt-1">${u.nickname || '-'}</p></div>
        <div><p class="text-xs text-secondary">个性签名</p><p class="text-sm mt-1">${u.signature || '-'}</p></div>
        <div><p class="text-xs text-secondary">币种</p><p class="text-sm mt-1">${u.currency || 'CNY'}</p></div>
        <div><p class="text-xs text-secondary">注册时间</p><p class="text-sm mt-1">${u.created_at ? u.created_at.slice(0, 16).replace('T', ' ') : '-'}</p></div>
        <div><p class="text-xs text-secondary">最后登录</p><p class="text-sm mt-1">${u.last_login_at ? u.last_login_at.slice(0, 16).replace('T', ' ') : '从未登录'}</p></div>
        <div><p class="text-xs text-secondary">头像</p>
          <div class="mt-1 w-10 h-10 rounded-full bg-surface-container overflow-hidden">
            ${u.avatar_url ? `<img src="${u.avatar_url}" class="w-full h-full object-cover">` : '<span class="material-symbols-outlined text-secondary flex items-center justify-center h-full">person</span>'}
          </div>
        </div>
      `;
      document.getElementById('accountCount').textContent = u.account_count;
      document.getElementById('totalBalance').textContent = '¥' + Number(u.total_balance).toLocaleString();
      document.getElementById('monthIncome').textContent = '¥' + Number(u.month_income).toLocaleString();
      document.getElementById('monthExpense').textContent = '¥' + Number(u.month_expense).toLocaleString();
      document.getElementById('userStatus').innerHTML = u.is_active
        ? '<span class="badge badge-success">正常</span>'
        : '<span class="badge badge-danger">已禁用</span>';
      document.getElementById('viewTransactionsBtn').href = `./transactions.html?userId=${userId}`;
      document.getElementById('viewAccountsBtn').href = `./accounts.html?userId=${userId}`;
    }
  </script>
</body>
</html>
