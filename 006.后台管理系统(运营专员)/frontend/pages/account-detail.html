<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户详情 - 随手记账后台管理系统</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="bg-surface">
  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span></div>
        <div><h1 class="font-headline-md font-bold text-primary">随手记账</h1><p class="text-label-sm text-secondary">后台管理系统</p></div>
      </div>
      <div class="flex items-center gap-3">
        <a href="./accounts.html" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">arrow_back</span> 返回账户列表</a>
        <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">logout</span></button>
      </div>
    </div>
  </header>
  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="./dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="./users.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="./transactions.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./statistics/overview.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="./accounts.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="./budgets.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
    </aside>
    <main class="flex-1 md:ml-60 p-6">
      <div id="loadingState" class="text-center py-20 text-secondary"><span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span><p class="mt-3">加载中...</p></div>
      <div id="contentArea" class="hidden space-y-6">
        <div class="bg-white rounded-xl border border-border-light p-6 shadow-card">
          <h3 class="font-semibold text-on-surface mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">account_balance_wallet</span> 账户详情</h3>
          <dl class="grid grid-cols-2 gap-x-8 gap-y-4" id="detailDl"></dl>
        </div>
        <div class="bg-white rounded-xl border border-border-light p-5 shadow-card">
          <h3 class="font-semibold text-on-surface mb-4">最近10笔账单</h3>
          <table class="data-table">
            <thead><tr><th>日期</th><th>类型</th><th>金额</th><th>分类</th><th>备注</th></tr></thead>
            <tbody id="txnTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const typeMap = { expense: '支出', income: '收入', transfer: '转账' };
    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = './accounts.html'; return; }
      loadDetail(id);
    });
    async function loadDetail(id) {
      const result = await SSJ.apiRequest(`/accounts/${id}`);
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentArea').classList.remove('hidden');
      if (result.success && result.data.success) renderDetail(result.data.data);
      else document.getElementById('contentArea').innerHTML = '<div class="empty-state"><span class="material-symbols-outlined text-4xl text-alert-red">error</span><p>账户不存在</p></div>';
    }
    function renderDetail(a) {
      const typeMap2 = { cash: '现金', electronic: '电子钱包', bank: '银行卡', credit: '信用卡', other: '其他' };
      const fields = [
        ['账户ID', a.id], ['用户名', `<a href="./user-detail.html?id=${a.user_id}" class="text-primary">${a.username}</a>`],
        ['账户名称', a.name], ['类型', typeMap2[a.type] || a.type],
        ['期初余额', '¥' + Number(a.initial_balance).toFixed(2)], ['当前余额', '¥' + Number(a.current_balance).toFixed(2)],
        ['是否默认', a.is_default ? '是' : '否'], ['状态', a.is_active ? '正常' : '已删除'],
        ['创建时间', a.created_at ? a.created_at.slice(0, 16).replace('T', ' ') : '-']
      ];
      document.getElementById('detailDl').innerHTML = fields.map(([label, value]) => `
        <div class="border-b border-border-light pb-3">
          <dt class="text-xs font-semibold text-secondary mb-1">${label}</dt>
          <dd class="text-sm text-on-surface">${value}</dd>
        </div>
      `).join('');
      const txnTable = document.getElementById('txnTable');
      const txns = a.recent_transactions || [];
      if (!txns.length) { txnTable.innerHTML = '<tr><td colspan="5" class="text-center text-secondary py-8">暂无账单</td></tr>'; return; }
      txnTable.innerHTML = txns.map(t => `
        <tr>
          <td>${t.transaction_date}</td>
          <td><span class="badge ${t.type === 'expense' ? 'badge-danger' : t.type === 'income' ? 'badge-info' : 'badge-warning'}">${typeMap[t.type]}</span></td>
          <td class="${t.type === 'expense' ? 'text-alert-red' : t.type === 'income' ? 'text-blue-500' : ''}">¥${Number(t.amount).toLocaleString()}</td>
          <td>${t.category_name || '-'}</td>
          <td class="text-xs text-secondary">${t.note || '-'}</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
