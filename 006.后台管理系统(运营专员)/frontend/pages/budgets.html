<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预算管理 - 随手记账后台管理系统</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="bg-surface">
  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span></div>
        <div><h1 class="font-headline-md font-bold text-primary">随手记账</h1><p class="text-label-sm text-secondary">后台管理系统</p></div>
      </div>
      <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">logout</span></button>
    </div>
  </header>
  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="./dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="./users.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="./transactions.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./statistics/overview.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="./accounts.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="./budgets.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
    </aside>
    <main class="flex-1 md:ml-60 p-6">
      <div class="mb-6">
        <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface">预算管理</h2>
        <p class="text-sm text-secondary mt-1">查看用户月度预算</p>
      </div>

      <!-- 筛选 -->
      <div class="bg-white rounded-xl border border-border-light p-4 mb-6 shadow-card">
        <form id="filterForm" class="flex flex-wrap gap-3 items-end">
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">用户名</label>
            <input type="text" id="searchUserId" placeholder="用户ID" class="px-3 py-2 border border-border rounded-lg text-sm w-36 focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-xs font-semibold text-secondary mb-1">月份</label>
            <input type="month" id="yearMonth" class="px-3 py-2 border border-border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:bg-primary-hover transition">查询</button>
            <button type="button" onclick="resetFilters()" class="px-4 py-2 border border-border rounded-lg text-sm ml-2 hover:bg-surface-container transition">重置</button>
          </div>
        </form>
      </div>

      <!-- 表格 -->
      <div class="bg-white rounded-xl border border-border-light shadow-card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>预算ID</th>
                <th>用户</th>
                <th>月份</th>
                <th>类型</th>
                <th>分类</th>
                <th>预算金额</th>
                <th>警戒阈值</th>
                <th>使用进度</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-t border-border-light bg-surface-container">
          <span class="text-sm text-secondary" id="totalText"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    let currentPage = 1, pageSize = 20;
    let currentFilters = {};
    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const now = new Date();
      document.getElementById('yearMonth').value = now.toISOString().slice(0, 7);
      loadBudgets();
      document.getElementById('filterForm').addEventListener('submit', e => { e.preventDefault(); applyFilters(); });
    });
    function applyFilters() {
      currentFilters = {
        userId: document.getElementById('searchUserId').value.trim(),
        yearMonth: document.getElementById('yearMonth').value
      };
      currentPage = 1; loadBudgets();
    }
    function resetFilters() {
      document.getElementById('searchUserId').value = '';
      const now = new Date();
      document.getElementById('yearMonth').value = now.toISOString().slice(0, 7);
      currentFilters = {}; currentPage = 1; loadBudgets();
    }
    async function loadBudgets() {
      const params = { page: currentPage, pageSize, ...currentFilters };
      const query = new URLSearchParams();
      Object.entries(params).forEach(([k, v]) => v && query.append(k, v));
      const result = await SSJ.apiRequest('/budgets?' + query.toString());
      if (result.success && result.data.success) renderTable(result.data.data);
      else SSJAdmin.showToast('加载失败', true);
    }
    function renderTable(data) {
      const { list, total, pageSize: ps } = data;
      document.getElementById('totalText').textContent = `共 ${total} 条`;
      const tbody = document.getElementById('tableBody');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-secondary py-12">暂无数据</td></tr>'; document.getElementById('pagination').innerHTML = ''; return; }
      tbody.innerHTML = list.map(b => {
        const pct = Number(b.used_percentage);
        const barClass = pct >= 100 ? 'danger' : pct >= 80 ? 'warning' : '';
        return `
          <tr>
            <td class="text-xs text-secondary">${b.id}</td>
            <td><a href="./user-detail.html?id=${b.user_id}" class="text-primary">${b.username}</a></td>
            <td>${b.year_month}</td>
            <td><span class="badge ${b.category_id ? 'badge-info' : 'badge-success'}">${b.category_id ? '分类预算' : '总预算'}</span></td>
            <td>${b.category_name || '全局'}</td>
            <td class="font-semibold">¥${Number(b.budget_amount).toLocaleString()}</td>
            <td>${b.alert_threshold}%</td>
            <td>
              <div class="flex items-center gap-2">
                <div class="progress-bar flex-1" style="width:80px">
                  <div class="progress-bar-fill ${barClass}" style="width:${pct}%"></div>
                </div>
                <span class="text-xs font-medium ${pct >= 100 ? 'text-alert-red' : pct >= 80 ? 'text-warning-yellow' : 'text-primary'}">${b.used_percentage}%</span>
              </div>
              <div class="text-xs text-secondary mt-0.5">¥${Number(b.used_amount).toLocaleString()} / ¥${Number(b.budget_amount).toLocaleString()}</div>
            </td>
          </tr>
        `;
      }).join('');
      renderPagination(total, ps);
    }
    function renderPagination(total, ps) {
      const totalPages = Math.ceil(total / ps);
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        else if (Math.abs(i - currentPage) === 3) html += `<span class="px-1">...</span>`;
      }
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">下一页</button>`;
      container.innerHTML = html;
    }
    function goPage(p) { currentPage = p; loadBudgets(); }
  </script>
</body>
</html>
