<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账单详情 - 随手记账后台管理系统</title>
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>tailwind.config = window.tailwindConfig;</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="bg-surface">
  <header class="sticky top-0 z-50 bg-white border-b border-border-light">
    <div class="flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-lg">admin_panel_settings</span></div>
        <div><h1 class="font-headline-md font-bold text-primary">随手记账</h1><p class="text-label-sm text-secondary">后台管理系统</p></div>
      </div>
      <div class="flex items-center gap-3">
        <a href="./transactions.html" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">arrow_back</span> 返回账单列表</a>
        <button onclick="SSJ.logout()" class="flex items-center gap-1 text-sm text-secondary hover:text-primary transition"><span class="material-symbols-outlined text-lg">logout</span></button>
      </div>
    </div>
  </header>
  <div class="flex">
    <aside class="hidden md:flex flex-col w-60 fixed left-0 top-16 bottom-0 bg-white border-r border-border-light p-4 gap-1">
      <nav class="flex flex-col gap-1">
        <a href="./dashboard.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">dashboard</span> 仪表盘</a>
        <a href="./users.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">group</span> 用户管理</a>
        <a href="./transactions.html" class="sidebar-nav-item active"><span class="material-symbols-outlined text-xl">receipt_long</span> 账单管理</a>
        <a href="./statistics/overview.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">bar_chart</span> 收入支出分析</a>
        <a href="./accounts.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">account_balance_wallet</span> 账户管理</a>
        <a href="./budgets.html" class="sidebar-nav-item"><span class="material-symbols-outlined text-xl">savings</span> 预算管理</a>
      </nav>
    </aside>
    <main class="flex-1 md:ml-60 p-6">
      <div id="loadingState" class="text-center py-20 text-secondary"><span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span><p class="mt-3">加载中...</p></div>
      <div id="contentArea" class="hidden">
        <div class="bg-white rounded-xl border border-border-light p-6 shadow-card">
          <h3 class="font-semibold text-on-surface mb-6 flex items-center gap-2"><span class="material-symbols-outlined text-primary">receipt_long</span> 账单详情</h3>
          <dl class="grid grid-cols-2 gap-x-8 gap-y-4" id="detailDl"></dl>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    const typeMap = { expense: '支出', income: '收入', transfer: '转账' };
    document.addEventListener('DOMContentLoaded', () => {
      if (!SSJ.isLoggedIn()) { window.location.href = '../login.html'; return; }
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = './transactions.html'; return; }
      loadDetail(id);
    });
    async function loadDetail(id) {
      const result = await SSJ.apiRequest(`/transactions/${id}`);
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentArea').classList.remove('hidden');
      if (result.success && result.data.success) {
        renderDetail(result.data.data);
      } else {
        document.getElementById('contentArea').innerHTML = '<div class="empty-state"><span class="material-symbols-outlined text-4xl text-alert-red">error</span><p>账单不存在</p></div>';
      }
    }
    function renderDetail(t) {
      const rows = [
        ['账单ID', t.id],
        ['用户名', `<a href="./user-detail.html?id=${t.user_id}" class="text-primary">${t.username}</a>`],
        ['类型', `<span class="badge ${t.type === 'expense' ? 'badge-danger' : t.type === 'income' ? 'badge-info' : 'badge-warning'}">${typeMap[t.type] || t.type}</span>`],
        ['金额', `¥${Number(t.amount).toLocaleString()}`],
        ['分类', t.category_name || '-'],
        ['账户（支出方）', t.from_account_name || '-'],
        ['账户（收入方）', t.to_account_name || '-'],
        ['日期', t.transaction_date],
        ['时间', t.transaction_time || '-'],
        ['备注', t.note || '-'],
        ['创建时间', t.created_at ? t.created_at.slice(0, 16).replace('T', ' ') : '-'],
      ];
      document.getElementById('detailDl').innerHTML = rows.map(([label, value]) => `
        <div class="border-b border-border-light pb-3">
          <dt class="text-xs font-semibold text-secondary mb-1">${label}</dt>
          <dd class="text-sm text-on-surface">${value}</dd>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
